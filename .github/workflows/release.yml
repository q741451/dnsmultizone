name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # x86_64 (glibc; dockcross has no musl x86_64 image, -static glibc works fine here)
          - name: x86_64
            image: dockcross/linux-x64
            output: dnsmultizone-linux-x86_64

          # aarch64 / arm64 (musl)
          - name: aarch64
            image: dockcross/linux-arm64-musl
            output: dnsmultizone-linux-aarch64

          # armv7 硬浮点，主流现代 ARM 路由器/设备 (musl)
          - name: armv7-hf
            image: dockcross/linux-armv7l-musl
            output: dnsmultizone-linux-armv7-hf

          # armv5 软浮点，老旧/低端 ARM 路由器 (musl)
          - name: armv5-sf
            image: dockcross/linux-armv5-musl
            output: dnsmultizone-linux-armv5-sf

          # mips 大端，glibc 2.28 (dockcross 未提供 mips 的 musl/软浮点镜像)
          - name: mips
            image: dockcross/linux-mips-lts
            output: dnsmultizone-linux-mips

          # mipsel 小端，glibc 2.28，常见于 MTK/Ralink 路由器 SoC
          - name: mipsel
            image: dockcross/linux-mipsel-lts
            output: dnsmultizone-linux-mipsel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull cross toolchain image
        run: docker pull ${{ matrix.image }}

      - name: Build
        run: |
          set -e
          make clean
          docker run --rm \
            -v "${{ github.workspace }}":/work \
            -w /work \
            ${{ matrix.image }} \
            bash -c 'make CXX=$CXX CXXFLAGS="-Wall -std=c++11 -Wno-format-security" CPPFLAGS=-O2 LDFLAGS="-static -s"'
          file dnsmultizone
          mkdir -p dist
          cp dnsmultizone dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
