name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 所有架构统一使用 abcfy2/muslcc-toolchain-ubuntu 这个 Docker Hub 镜像，
          # 它把 musl.cc 的完整工具链目录原样打包分发，tag 就是工具链三元组名。
          # 这样既避免了直连 musl.cc 下载不稳定的问题，也能拿到全架构的 musl 静态编译
          # （包括 dockcross 官方镜像不提供的 x86_64-musl 和 mips 软浮点）。
          - name: x86_64
            tag: x86_64-linux-musl
            output: dnsmultizone-linux-x86_64

          - name: aarch64
            tag: aarch64-linux-musl
            output: dnsmultizone-linux-aarch64

          # armv7 硬浮点，主流现代 ARM 路由器/设备
          - name: armv7-hf
            tag: arm-linux-musleabihf
            output: dnsmultizone-linux-armv7-hf

          # armv5 软浮点，老旧/低端 ARM 路由器
          - name: armv5-sf
            tag: arm-linux-musleabi
            output: dnsmultizone-linux-armv5-sf

          # mips 大端软浮点，常见无 FPU 路由器 SoC
          - name: mips-sf
            tag: mips-linux-muslsf
            output: dnsmultizone-linux-mips-sf

          # mipsel 小端软浮点，MTK/Ralink 等常见路由器 SoC
          - name: mipsel-sf
            tag: mipsel-linux-muslsf
            output: dnsmultizone-linux-mipsel-sf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull cross toolchain image
        run: docker pull abcfy2/muslcc-toolchain-ubuntu:${{ matrix.tag }}

      - name: Build
        run: |
          set -e
          make clean
          docker run --rm \
            -v "${{ github.workspace }}":/work \
            -w /work \
            abcfy2/muslcc-toolchain-ubuntu:${{ matrix.tag }} \
            bash -c 'make CXX=${{ matrix.tag }}-g++ CXXFLAGS="-Wall -std=c++11 -Wno-format-security" CPPFLAGS=-O2 LDFLAGS="-static -s"'
          file dnsmultizone
          mkdir -p dist
          cp dnsmultizone dist/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: dist/${{ matrix.output }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
